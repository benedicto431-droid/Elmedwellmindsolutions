<!-- templates/base.html - COMPLETE WITH ALL FEATURES RETAINED -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="HzFd4jLBlbEmktxR8XoUh8H7SBQAn72BDgKZt0OmMWo" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6C63FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Elmed Wellmind">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/icons/icon-152x152.png">
    
    <!-- Windows Tiles -->
    <meta name="msapplication-TileColor" content="#6C63FF">
    <meta name="msapplication-TileImage" content="/static/icons/icon-144x144.png">
    
    <title>{% block title %}Elmed Wellmind Solutions | Mental Wellness Kenya{% endblock %}</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --accent: #36D1DC;
            --light: #F8F9FF;
            --dark: #2A2D43;
            --success: #4CC9A7;
            --warning: #FF9F1C;
            --text: #333344;
            --white: #FFFFFF;
            --gradient-primary: linear-gradient(135deg, #6C63FF 0%, #36D1DC 100%);
            --gradient-secondary: linear-gradient(135deg, #FF6584 0%, #FF9F1C 100%);
            --gradient-dark: linear-gradient(135deg, #2A2D43 0%, #1A1D33 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--light);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--dark);
        }

        .container {
            width: 90%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 70px;
            position: relative;
            z-index: 5;
        }

        .section-title h2 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-title h2 span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .section-title p {
            max-width: 700px;
            margin: 0 auto;
            color: #666;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--white);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(108, 99, 255, 0.5);
        }

        .btn-secondary {
            background: var(--gradient-secondary);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 101, 132, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 101, 132, 0.5);
        }

        /* Floating Buttons */
        .floating-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-end;
        }

        .floating-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .whatsapp-btn {
            background: #25D366;
        }

        .call-btn {
            background: var(--primary);
        }

        .ai-chat-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
        }

        .donate-btn-float {
            background: var(--secondary);
        }

        .btn-label {
            position: absolute;
            right: 70px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .floating-btn:hover .btn-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Auth Links */
        .auth-links {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
        }

        .auth-link {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .auth-link.login {
            background: var(--primary);
            color: white;
            border: 2px solid var(--primary);
        }

        .auth-link.login:hover {
            background: transparent;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .auth-link.register {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .auth-link.register:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .auth-link i {
            font-size: 0.9rem;
        }

        .user-menu {
            position: relative;
            display: inline-block;
        }

        .user-menu-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .user-menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .user-menu-btn img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            min-width: 200px;
            display: none;
            z-index: 1000;
            margin-top: 10px;
        }

        .user-dropdown.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .user-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: var(--dark);
            text-decoration: none;
            transition: all 0.3s;
            border-bottom: 1px solid #f0f2ff;
        }

        .user-dropdown a:last-child {
            border-bottom: none;
        }

        .user-dropdown a:hover {
            background: var(--light);
            color: var(--primary);
            padding-left: 25px;
        }

        .user-dropdown a i {
            width: 20px;
            color: var(--primary);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Styles */
        @media (max-width: 992px) {
            .section-title h2 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .section-title h2 {
                font-size: 2.2rem;
            }
            
            .floating-buttons {
                bottom: 20px;
                right: 20px;
            }
            
            .floating-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }

            .auth-links {
                margin-left: 0;
                margin-top: 10px;
                justify-content: center;
            }
        }

        @media (max-width: 576px) {
            .section-title h2 {
                font-size: 2rem;
            }
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideInRight 0.3s ease;
            max-width: 350px;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--secondary);
        }

        .toast.info {
            border-left: 4px solid var(--primary);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        .toast-icon {
            font-size: 1.5rem;
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error .toast-icon {
            color: var(--secondary);
        }

        .toast.info .toast-icon {
            color: var(--primary);
        }

        .toast.warning .toast-icon {
            color: var(--warning);
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .toast-message {
            font-size: 0.9rem;
            color: #666;
        }

        .toast-close {
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .toast-close:hover {
            color: var(--dark);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'header.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'footer.html' %}
    
    {% include 'floating-buttons.html' %}
    
    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    {% block scripts %}
    <script>
        // Global configuration
        const API_BASE = window.location.origin + '/api';
        let chatSessionId = localStorage.getItem('chatSessionId') || 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chatSessionId', chatSessionId);
        
        // Check if user is logged in
        let currentUser = null;
        
        async function checkAuth() {
            try {
                const response = await fetch('/auth/api/session');
                const data = await response.json();
                if (data.authenticated) {
                    currentUser = data;
                    updateUIForLoggedInUser(data);
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
        }
        
        function updateUIForLoggedInUser(user) {
            // Update navigation to show user menu
            const nav = document.querySelector('nav ul');
            if (nav) {
                // Remove existing auth links
                const existingLogin = document.querySelector('.auth-links');
                if (existingLogin) existingLogin.remove();
                
                // Add user menu
                const userLi = document.createElement('li');
                userLi.className = 'user-menu';
                userLi.innerHTML = `
                    <div class="user-menu">
                        <button class="user-menu-btn" onclick="toggleUserMenu()">
                            <i class="fas fa-user-circle"></i>
                            <span>${user.name || 'My Account'}</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="/profile"><i class="fas fa-user"></i> Profile</a>
                            <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
                            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                `;
                nav.appendChild(userLi);
            }
        }
        
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('show');
        }
        
        // Close dropdown when clicking outside
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu')) {
                const dropdown = document.getElementById('userDropdown');
                if (dropdown) dropdown.classList.remove('show');
            }
        });
        
        async function logout() {
            try {
                const response = await fetch('/auth/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Logout successful', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                }
            } catch (error) {
                console.error('Logout failed:', error);
                showToast('Logout failed', 'error');
            }
        }
        
        // Toast notification system
        function showToast(message, type = 'info', title = '') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            const titles = {
                success: 'Success',
                error: 'Error',
                warning: 'Warning',
                info: 'Information'
            };
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas ${icons[type] || icons.info}"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title || titles[type]}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <div class="toast-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </div>
            `;
            
            container.appendChild(toast);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);
        }
        
        // Helper functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} minute${diffMins !== 1 ? 's' : ''} ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours !== 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays !== 1 ? 's' : ''} ago`;
            
            return date.toLocaleDateString('en-KE', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        function formatDateTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleString('en-KE', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // Prevent all anchor links from scrolling
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication status
            checkAuth();
            
            // Override all anchor link clicks
            document.addEventListener('click', function(e) {
                const target = e.target.closest('a');
                if (!target) return;
                
                const href = target.getAttribute('href');
                
                // Check if it's an anchor link (starts with #)
                if (href && href.startsWith('#')) {
                    e.preventDefault();
                    
                    // Instead of scrolling, we just prevent default
                    // This keeps the page at the top
                    console.log('Anchor link prevented:', href);
                    return false;
                }
            });
            
            // Make phone numbers clickable
            document.querySelectorAll('.phone-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    if(this.getAttribute('href').startsWith('tel:')) {
                        return; // For call links, they work naturally
                    }
                });
            });
            
            // Add CSRF token to all fetch requests
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            if (csrfToken) {
                const originalFetch = window.fetch;
                window.fetch = function(url, options = {}) {
                    if (!options.headers) options.headers = {};
                    options.headers['X-CSRFToken'] = csrfToken;
                    return originalFetch(url, options);
                };
            }
            
            console.log('Elmed Wellmind Solutions loaded successfully');
        });
        
        // Handle offline/online status
        window.addEventListener('offline', function() {
            showToast('You are offline. Some features may be unavailable.', 'warning', 'Offline');
        });
        
        window.addEventListener('online', function() {
            showToast('You are back online!', 'success', 'Online');
        });
    </script>
    {% endblock %}
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registered with scope:', registration.scope);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', function() {
                            const newWorker = registration.installing;
                            console.log('ServiceWorker update found!');
                            
                            newWorker.addEventListener('statechange', function() {
                                if (newWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        showToast('New version available! Refresh to update.', 'info', 'Update Available');
                                    }
                                }
                            });
                        });
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker registration failed:', error);
                    });
                
                // Check for PWA install prompt
                let deferredPrompt;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    console.log('Install prompt available');
                    
                    // Show install button if needed
                    const installBtn = document.getElementById('installPWA');
                    if (installBtn) {
                        installBtn.style.display = 'block';
                        installBtn.addEventListener('click', () => {
                            deferredPrompt.prompt();
                            deferredPrompt.userChoice.then((choiceResult) => {
                                if (choiceResult.outcome === 'accepted') {
                                    console.log('User accepted the install prompt');
                                }
                                deferredPrompt = null;
                            });
                        });
                    }
                });
            });
        }
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
