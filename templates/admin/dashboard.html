<!-- templates/admin/dashboard.html -->
{% extends "base.html" %}

{% block title %}Admin Dashboard | Elmed Wellmind{% endblock %}

{% block content %}
<div class="admin-dashboard">
    <div class="dashboard-header">
        <h1>Admin Dashboard</h1>
        <div class="admin-actions">
            <button onclick="refreshData()" class="btn btn-outline">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <!-- Stats will be loaded via JavaScript -->
        <div class="stat-card loading">Loading stats...</div>
    </div>

    <div class="dashboard-tabs">
        <button class="tab-btn active" onclick="showTab('users')">Users</button>
        <button class="tab-btn" onclick="showTab('professionals')">Professionals</button>
        <button class="tab-btn" onclick="showTab('organizations')">Organizations</button>
        <button class="tab-btn" onclick="showTab('posts')">Community Posts</button>
        <button class="tab-btn" onclick="showTab('logs')">Activity Logs</button>
    </div>

    <div id="usersTab" class="tab-content active">
        <div class="search-bar">
            <input type="text" id="userSearch" placeholder="Search users...">
            <select id="userRoleFilter">
                <option value="">All Roles</option>
                <option value="client">Clients</option>
                <option value="professional">Professionals</option>
                <option value="organization">Organizations</option>
                <option value="admin">Admins</option>
            </select>
            <button onclick="loadUsers()" class="btn btn-primary">Search</button>
        </div>
        <div id="usersList"></div>
    </div>

    <div id="professionalsTab" class="tab-content">
        <h3>Pending Verifications</h3>
        <div id="pendingProfessionals"></div>
    </div>

    <div id="organizationsTab" class="tab-content">
        <p>Organizations management coming soon...</p>
    </div>

    <div id="postsTab" class="tab-content">
        <div id="pendingPosts"></div>
    </div>

    <div id="logsTab" class="tab-content">
        <div id="activityLogs"></div>
    </div>
</div>

<style>
.admin-dashboard {
    padding: 120px 20px 40px;
    max-width: 1400px;
    margin: 0 auto;
}

.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 20px;
}

.dashboard-header h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, #6C63FF, #36D1DC);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: transform 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(108,99,255,0.1);
}

.stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: #6C63FF;
    margin-bottom: 5px;
}

.stat-label {
    color: #666;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.dashboard-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 10px;
    overflow-x: auto;
}

.tab-btn {
    padding: 10px 25px;
    background: none;
    border: none;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    border-radius: 25px;
    transition: all 0.3s;
    white-space: nowrap;
}

.tab-btn:hover {
    background: #f0f2ff;
    color: #6C63FF;
}

.tab-btn.active {
    background: linear-gradient(135deg, #6C63FF, #36D1DC);
    color: white;
}

.tab-content {
    display: none;
    animation: fadeIn 0.5s ease;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.search-bar input,
.search-bar select {
    padding: 12px 20px;
    border: 2px solid #e0e2ff;
    border-radius: 10px;
    font-size: 1rem;
    flex: 1;
    min-width: 200px;
}

.user-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.user-table th {
    background: #f8f9ff;
    padding: 15px;
    text-align: left;
    color: #2D2B5E;
}

.user-table td {
    padding: 15px;
    border-bottom: 1px solid #f0f2ff;
}

.user-table tr:hover {
    background: #f8f9ff;
}

.badge {
    padding: 5px 10px;
    border-radius: 15px;
    font-size: 0.85rem;
    font-weight: 600;
}

.badge-active {
    background: rgba(76,175,80,0.1);
    color: #2e7d32;
}

.badge-inactive {
    background: rgba(255,71,87,0.1);
    color: #c0392b;
}

.badge-verified {
    background: rgba(108,99,255,0.1);
    color: #6C63FF;
}

.action-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    margin: 0 3px;
}

.action-btn.edit {
    background: #f0f2ff;
    color: #6C63FF;
}

.action-btn.toggle {
    background: #ffecb3;
    color: #b85c00;
}

.action-btn.reset {
    background: #ffcdd2;
    color: #c0392b;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #999;
}

@media (max-width: 768px) {
    .dashboard-header h1 {
        font-size: 2rem;
    }
    
    .user-table {
        display: block;
        overflow-x: auto;
    }
    
    .search-bar {
        flex-direction: column;
    }
    
    .search-bar input,
    .search-bar select,
    .search-bar button {
        width: 100%;
    }
}
</style>

<script>
let currentPage = 1;

async function loadDashboardStats() {
    try {
        const response = await fetch('/admin/api/dashboard/stats');
        const data = await response.json();
        
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card">
                <div class="stat-number">${data.stats.total_users}</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${data.stats.total_clients}</div>
                <div class="stat-label">Clients</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${data.stats.total_professionals}</div>
                <div class="stat-label">Professionals</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${data.stats.total_organizations}</div>
                <div class="stat-label">Organizations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${data.stats.pending_professionals}</div>
                <div class="stat-label">Pending Verifications</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${data.stats.sessions_today}</div>
                <div class="stat-label">Sessions Today</div>
            </div>
        `;
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

async function loadUsers() {
    const search = document.getElementById('userSearch').value;
    const role = document.getElementById('userRoleFilter').value;
    
    try {
        const response = await fetch(`/admin/api/users?page=${currentPage}&search=${search}&role=${role}`);
        const data = await response.json();
        
        let html = '<table class="user-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Verified</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
        
        data.users.forEach(user => {
            html += `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.full_name}</td>
                    <td>${user.email}</td>
                    <td>${user.role}</td>
                    <td><span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">${user.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td><span class="badge ${user.is_verified ? 'badge-verified' : ''}">${user.is_verified ? 'Verified' : 'Pending'}</span></td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="action-btn edit" onclick="editUser(${user.id})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn toggle" onclick="toggleUserStatus(${user.id})"><i class="fas ${user.is_active ? 'fa-ban' : 'fa-check'}"></i></button>
                        <button class="action-btn reset" onclick="resetPassword(${user.id})"><i class="fas fa-key"></i></button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        
        if (data.pages > 1) {
            html += '<div class="pagination">';
            for (let i = 1; i <= data.pages; i++) {
                html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            html += '</div>';
        }
        
        document.getElementById('usersList').innerHTML = html;
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

async function loadPendingProfessionals() {
    try {
        const response = await fetch('/admin/api/professionals/pending');
        const professionals = await response.json();
        
        let html = '<table class="user-table"><thead><tr><th>Name</th><th>Type</th><th>License</th><th>Experience</th><th>Fee</th><th>Documents</th><th>Actions</th></tr></thead><tbody>';
        
        professionals.forEach(prof => {
            html += `
                <tr>
                    <td>${prof.name}</td>
                    <td>${prof.professional_type}</td>
                    <td>${prof.license_number}</td>
                    <td>${prof.years_experience} years</td>
                    <td>KES ${prof.session_fee}</td>
                    <td>
                        ${prof.documents.map(doc => `<a href="/uploads/documents/${doc}" target="_blank">View</a>`).join(', ')}
                    </td>
                    <td>
                        <button class="action-btn edit" onclick="verifyProfessional(${prof.id})"><i class="fas fa-check"></i> Verify</button>
                        <button class="action-btn reset" onclick="rejectProfessional(${prof.id})"><i class="fas fa-times"></i> Reject</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        document.getElementById('pendingProfessionals').innerHTML = html;
    } catch (error) {
        console.error('Error loading professionals:', error);
    }
}

async function verifyProfessional(id) {
    if (!confirm('Are you sure you want to verify this professional?')) return;
    
    try {
        const response = await fetch(`/admin/api/professionals/verify/${id}`, {
            method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
            alert('Professional verified successfully');
            loadPendingProfessionals();
            loadDashboardStats();
        }
    } catch (error) {
        console.error('Error verifying professional:', error);
    }
}

async function rejectProfessional(id) {
    const reason = prompt('Please provide a reason for rejection:');
    if (!reason) return;
    
    try {
        const response = await fetch(`/admin/api/professionals/reject/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason })
        });
        const result = await response.json();
        
        if (result.success) {
            alert('Professional rejected');
            loadPendingProfessionals();
        }
    } catch (error) {
        console.error('Error rejecting professional:', error);
    }
}

async function toggleUserStatus(userId) {
    if (!confirm('Are you sure you want to toggle this user\'s status?')) return;
    
    try {
        const response = await fetch(`/admin/api/users/${userId}/toggle-status`, {
            method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
            alert(result.message);
            loadUsers();
            loadDashboardStats();
        }
    } catch (error) {
        console.error('Error toggling user status:', error);
    }
}

async function resetPassword(userId) {
    const newPassword = prompt('Enter new password (min 8 characters):');
    if (!newPassword || newPassword.length < 8) {
        alert('Password must be at least 8 characters');
        return;
    }
    
    try {
        const response = await fetch(`/admin/api/users/${userId}/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: newPassword })
        });
        const result = await response.json();
        
        if (result.success) {
            alert('Password reset successfully');
        }
    } catch (error) {
        console.error('Error resetting password:', error);
    }
}

function editUser(userId) {
    window.location.href = `/admin/user/${userId}`;
}

function changePage(page) {
    currentPage = page;
    loadUsers();
}

function showTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById(tabName + 'Tab').classList.add('active');
    
    // Load tab-specific data
    if (tabName === 'professionals') {
        loadPendingProfessionals();
    } else if (tabName === 'users') {
        loadUsers();
    }
}

function refreshData() {
    loadDashboardStats();
    const activeTab = document.querySelector('.tab-btn.active').textContent.toLowerCase();
    if (activeTab.includes('user')) {
        loadUsers();
    } else if (activeTab.includes('professional')) {
        loadPendingProfessionals();
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    loadDashboardStats();
    loadUsers();
    
    // Set up search with debounce
    let searchTimeout;
    document.getElementById('userSearch').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(loadUsers, 500);
    });
    
    document.getElementById('userRoleFilter').addEventListener('change', loadUsers);
});
</script>
{% endblock %}
