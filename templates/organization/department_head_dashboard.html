{% extends "base.html" %}

{% block title %}Department Head Dashboard{% endblock %}

{% block content %}
<style>
    .dashboard {
        padding: 100px 30px 40px;
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .header {
        background: linear-gradient(135deg, #10B981, #34D399);
        border-radius: 20px;
        padding: 30px;
        color: white;
        margin-bottom: 30px;
    }
    
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #10B981;
    }
    
    .employee-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }
    
    .employee-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    .risk-badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
    }
    
    .risk-high { background: #FEE2E2; color: #EF4444; }
    .risk-medium { background: #FEF3C7; color: #F59E0B; }
    .risk-low { background: #D1FAE5; color: #10B981; }
</style>

<div class="dashboard">
    <div class="header">
        <h1 id="deptName">Loading...</h1>
        <p>Department Head Dashboard</p>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <h2 style="margin-bottom: 20px;">Department Employees</h2>
    <div class="employee-grid" id="employeeGrid"></div>
</div>

<script>
async function loadDashboard() {
    const response = await fetch('/organization/api/dashboard/data');
    const data = await response.json();
    
    document.getElementById('deptName').textContent = data.department.name;
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
            <div class="stat-value">${data.department.employee_count}</div>
            <div>Total Employees</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${data.metrics.avg_wellness}</div>
            <div>Avg Wellness</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${data.metrics.high_risk}</div>
            <div>High Risk</div>
        </div>
    `;
    
    document.getElementById('employeeGrid').innerHTML = data.employee_stats.map(emp => `
        <div class="employee-card">
            <h3>Employee #${emp.id}</h3>
            <p>Wellness Score: ${emp.wellness_score}</p>
            <p>Risk Level: <span class="risk-badge risk-${emp.risk_level}">${emp.risk_level}</span></p>
            <p>Last Active: ${emp.last_active ? new Date(emp.last_active).toLocaleDateString() : 'Never'}</p>
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
{% endblock %}
