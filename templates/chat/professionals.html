<!-- templates/chat/professionals.html -->
{% extends "base.html" %}

{% block title %}Find a Professional | Elmed Wellmind{% endblock %}

{% block content %}
<style>
    .professionals-container {
        padding: 120px 30px 60px;
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .search-section {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        padding: 40px;
        color: white;
        margin-bottom: 40px;
    }
    
    .search-title {
        font-size: 2.5rem;
        margin-bottom: 20px;
    }
    
    .search-box {
        display: flex;
        gap: 15px;
        max-width: 600px;
    }
    
    .search-input {
        flex: 1;
        padding: 15px 25px;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
    }
    
    .search-btn {
        background: white;
        color: var(--primary);
        border: none;
        padding: 15px 35px;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .search-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    .filters {
        display: flex;
        gap: 15px;
        margin: 30px 0;
        flex-wrap: wrap;
    }
    
    .filter-btn {
        padding: 10px 25px;
        border: 2px solid var(--primary);
        border-radius: 50px;
        background: transparent;
        color: var(--primary);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .filter-btn:hover,
    .filter-btn.active {
        background: var(--primary);
        color: white;
    }
    
    .professionals-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 30px;
    }
    
    .professional-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        transition: all 0.3s;
        cursor: pointer;
    }
    
    .professional-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    
    .card-header {
        height: 100px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        position: relative;
    }
    
    .profile-image {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 5px solid white;
        position: absolute;
        bottom: -60px;
        left: 50%;
        transform: translateX(-50%);
        object-fit: cover;
        background: white;
    }
    
    .card-body {
        padding: 70px 25px 25px;
        text-align: center;
    }
    
    .professional-name {
        font-size: 1.5rem;
        margin-bottom: 5px;
        color: var(--dark);
    }
    
    .professional-type {
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 10px;
    }
    
    .rating {
        color: #FFD700;
        margin-bottom: 15px;
    }
    
    .specializations {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 20px;
    }
    
    .specialization-tag {
        background: #F3F4F6;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.9rem;
        color: var(--gray);
    }
    
    .professional-bio {
        color: var(--gray);
        line-height: 1.6;
        margin-bottom: 20px;
        font-size: 0.95rem;
    }
    
    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 25px;
        border-top: 1px solid #F3F4F6;
    }
    
    .session-fee {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary);
    }
    
    .chat-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .chat-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
    }
    
    .availability-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #10B981;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
    }
</style>

<div class="professionals-container">
    <div class="search-section">
        <h1 class="search-title">Find Your Perfect Professional</h1>
        <p style="margin-bottom: 30px;">Browse our network of verified mental health experts</p>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name, specialty, or condition...">
            <button class="search-btn" onclick="searchProfessionals()"><i class="fas fa-search"></i> Search</button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterProfessionals('all')">All</button>
            <button class="filter-btn" onclick="filterProfessionals('psychiatrist')">Psychiatrists</button>
            <button class="filter-btn" onclick="filterProfessionals('psychologist')">Psychologists</button>
            <button class="filter-btn" onclick="filterProfessionals('counselor')">Counselors</button>
            <button class="filter-btn" onclick="filterProfessionals('therapist')">Therapists</button>
        </div>
    </div>
    
    <div class="professionals-grid" id="professionalsGrid">
        <!-- Professionals will be loaded here -->
    </div>
</div>

<script>
let allProfessionals = [];

async function loadProfessionals() {
    try {
        const response = await fetch('/chat/api/professionals');
        allProfessionals = await response.json();
        displayProfessionals(allProfessionals);
    } catch (error) {
        console.error('Error loading professionals:', error);
    }
}

function displayProfessionals(professionals) {
    const grid = document.getElementById('professionalsGrid');
    
    if (professionals.length === 0) {
        grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No professionals found</p>';
        return;
    }
    
    grid.innerHTML = professionals.map(p => `
        <div class="professional-card" onclick="viewProfile(${p.id})">
            <div class="card-header">
                <img src="${p.profile_pic ? '/static/uploads/profiles/' + p.profile_pic : '/static/images/default-avatar.jpg'}" 
                     class="profile-image" alt="${p.name}">
                ${p.is_available ? '<span class="availability-badge"><i class="fas fa-circle"></i> Available</span>' : ''}
            </div>
            <div class="card-body">
                <h3 class="professional-name">${p.name}</h3>
                <div class="professional-type">${p.professional_type}</div>
                <div class="rating">
                    ${getRatingStars(p.average_rating)}
                    <span style="color: var(--gray); margin-left: 5px;">(${p.average_rating.toFixed(1)})</span>
                </div>
                <div class="specializations">
                    ${p.specializations.slice(0, 3).map(s => `<span class="specialization-tag">${s}</span>`).join('')}
                </div>
                <p class="professional-bio">${p.bio ? p.bio.substring(0, 100) + '...' : 'Experienced professional ready to help'}</p>
            </div>
            <div class="card-footer">
                <span class="session-fee">KES ${p.session_fee}/session</span>
                <button class="chat-btn" onclick="event.stopPropagation(); startChat(${p.id})">
                    <i class="fas fa-comments"></i> Chat
                </button>
            </div>
        </div>
    `).join('');
}

function getRatingStars(rating) {
    const fullStars = Math.floor(rating);
    const halfStar = rating % 1 >= 0.5;
    let stars = '';
    
    for (let i = 0; i < fullStars; i++) {
        stars += '<i class="fas fa-star"></i>';
    }
    if (halfStar) {
        stars += '<i class="fas fa-star-half-alt"></i>';
    }
    for (let i = 0; i < 5 - fullStars - (halfStar ? 1 : 0); i++) {
        stars += '<i class="far fa-star"></i>';
    }
    return stars;
}

function viewProfile(professionalId) {
    window.location.href = `/chat/professional/${professionalId}`;
}

function startChat(professionalId) {
    window.location.href = `/chat/conversation/${professionalId}`;
}

async function searchProfessionals() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    if (!query) {
        displayProfessionals(allProfessionals);
        return;
    }
    
    const filtered = allProfessionals.filter(p => 
        p.name.toLowerCase().includes(query) ||
        p.professional_type.toLowerCase().includes(query) ||
        p.specializations.some(s => s.toLowerCase().includes(query))
    );
    
    displayProfessionals(filtered);
}

function filterProfessionals(type) {
    // Update active filter
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    if (type === 'all') {
        displayProfessionals(allProfessionals);
    } else {
        const filtered = allProfessionals.filter(p => p.professional_type === type);
        displayProfessionals(filtered);
    }
}

// Load professionals on page load
document.addEventListener('DOMContentLoaded', loadProfessionals);
</script>
{% endblock %}
